name: Backend — Test & Deploy to Railway

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'railway.json'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

# ─────────────────────────────────────────────────────────────────────────────
# Required GitHub Secrets:
#   RAILWAY_TOKEN         – Railway API token (Settings → Tokens)
#   RAILWAY_SERVICE_ID    – Railway service ID for the backend
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  test:
    name: Lint & Test Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short 2>/dev/null || echo "No tests found — skipping"

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_ID }} --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
