name: Mobile — Expo EAS Build

on:
  push:
    branches: [main]
    paths:
      - 'app.json'
      - 'eas.json'
      - 'App.tsx'
      - 'package.json'
      - '.github/workflows/mobile.yml'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options: [all, android, ios]
      profile:
        description: 'Build profile'
        required: true
        default: 'preview'
        type: choice
        options: [development, preview, production]

# ─────────────────────────────────────────────────────────────────────────────
# Required GitHub Secrets:
#   EXPO_TOKEN            – Expo account token (expo.dev → Account Settings → Access Tokens)
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  build:
    name: EAS Build (${{ inputs.platform || 'android' }} / ${{ inputs.profile || 'preview' }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set up Expo & EAS CLI
        run: npm install -g expo-cli eas-cli

      - name: Authenticate with Expo
        run: expo whoami
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Run EAS Build
        run: |
          eas build \
            --platform ${{ inputs.platform || 'android' }} \
            --profile ${{ inputs.profile || 'preview' }} \
            --non-interactive \
            --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
