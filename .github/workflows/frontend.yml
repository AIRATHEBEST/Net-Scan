name: Frontend — Build & Deploy to Vercel

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'vite.config.ts'
      - 'tsconfig*.json'
      - 'package.json'
      - 'vercel.json'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'index.html'
      - 'vite.config.ts'
      - 'package.json'

# ─────────────────────────────────────────────────────────────────────────────
# Required GitHub Secrets:
#   VERCEL_TOKEN          – Vercel personal access token
#   VERCEL_ORG_ID         – Vercel organisation / team ID
#   VERCEL_PROJECT_ID     – Vercel project ID
#   VITE_API_URL          – Railway backend URL (e.g. https://netscan-api-production.up.railway.app)
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  build-and-deploy:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Node.js
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Type-check
      - name: TypeScript type-check
        run: npx tsc --noEmit
        continue-on-error: true   # warn but don't block deploy

      # 5. Build
      - name: Build production bundle
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      # 6. Deploy to Vercel (production on main, preview on PR)
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: ${{ github.ref == 'refs/heads/main' && '--prod' || '' }}
          working-directory: ./
