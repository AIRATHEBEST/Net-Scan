version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: netscan-postgres
    environment:
      POSTGRES_DB: netscan
      POSTGRES_USER: netscan
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_this_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netscan"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - netscan-network

  redis:
    image: redis:7-alpine
    container_name: netscan-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - netscan-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: netscan-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://netscan:${POSTGRES_PASSWORD:-change_this_password}@postgres:5432/netscan
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    volumes:
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8000:8000"
    networks:
      - netscan-network
    cap_add:
      - NET_ADMIN
      - NET_RAW
    privileged: true
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: netscan-frontend
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    networks:
      - netscan-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  netscan-network:
    driver: bridge
